name: Prebet refresh

on:
  schedule:
    # Poll every 15 min (14:00–23:59 Brussels) — runs prebet only inside T-50 window
    - cron: "*/15 14-23 * * *"
      timezone: Europe/Brussels
  workflow_dispatch:

permissions:
  contents: write

jobs:
  maybe-prebet:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Prebet if in refresh window
        env:
          APP_MCP_SERVER_URL: ${{ secrets.APP_MCP_SERVER_URL }}
          APP_MCP_SERVER_TOKEN: ${{ secrets.APP_MCP_SERVER_TOKEN }}
          CUP_CLASH_GROUP_ID: ${{ secrets.CUP_CLASH_GROUP_ID }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          TAVILY_API_KEY: ${{ secrets.TAVILY_API_KEY }}
          GEMINI_MODEL: gemini-2.5-flash
          GEMINI_MODEL_SUMMARIZE: gemini-2.5-flash-lite
          GEMINI_MODEL_SUMMARIZE_FALLBACK: gemini-2.5-flash
          GEMINI_MODEL_SUMMARIZE_OVERFLOW: gemini-3.5-flash
          GEMINI_MODEL_ANALYZE: gemini-3.5-flash
          GEMINI_MODEL_ANALYZE_FALLBACK: gemini-2.5-flash
          GEMINI_MODEL_ACT: gemini-2.5-flash
          GEMINI_MODEL_ACT_FALLBACK: gemini-2.5-flash-lite
          GEMINI_MIN_INTERVAL_SEC: "10"
          BET_BATCH_SIZE: "2"
        run: python -m src.cli maybe-prebet

      - name: Push state if changed
        run: bash scripts/ci_push_state.sh
